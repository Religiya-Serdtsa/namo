[cmake]
extensions = cmake,CMakeLists.txt
line_comment_tokens = #
string_delims = ",',`
flow = if,elseif,else,endif,foreach,endforeach,while,endwhile,function,endfunction,macro,endmacro
keywords = cmake_minimum_required,project,set,option,add_executable,add_library,target_link_libraries,target_include_directories,find_package,include,list,message,install,add_subdirectory
types = BOOL,ON,OFF,TRUE,FALSE,STATIC,SHARED,INTERFACE,PUBLIC,PRIVATE
return_keywords = return
